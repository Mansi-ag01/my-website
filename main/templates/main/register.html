<!DOCTYPE html>
<html>
<head><title>Create Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body">
                    <h2 class="text-center mb-4">🔐 Create New Admin</h2>

                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
                        {% endfor %}
                    {% endif %}

                    <form method="POST">
                        {% csrf_token %}
                        <input type="text" name="username" class="form-control mb-3" placeholder="Username" required>
                        <input type="email" name="email" class="form-control mb-3" placeholder="Email" required>
                        <input type="password" name="password1" class="form-control mb-3" placeholder="Password (8+)" required>
                        <input type="password" name="password2" class="form-control mb-3" placeholder="Confirm Password" required>
                        <button type="submit" class="btn btn-primary w-100">Create Admin</button>
                    </form>
                    <a href="{% url 'admin_panel' %}" class="btn btn-secondary w-100 mt-2">← Back to Admin</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
